<svg width="100%" viewBox="0 0 680 860" role="img" xmlns="http://www.w3.org/2000/svg"
  style="font-family: system-ui, -apple-system, sans-serif; background: #ffffff;">
  <title>UPI Fraud Shield AI — System Architecture</title>
  <desc>Microservices architecture showing client, API gateway, three backend services, an AI pipeline, and shared infrastructure.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ── Client ── -->
  <g>
    <rect x="220" y="24" width="240" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
    <text x="340" y="42" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#444441">Client</text>
    <text x="340" y="58" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">Postman · Angular · Mobile</text>
  </g>

  <line x1="340" y1="68" x2="340" y2="104" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="352" y="90" dominant-baseline="central" font-size="12" fill="#888780">HTTPS</text>

  <!-- ── API Gateway ── -->
  <g>
    <rect x="100" y="104" width="480" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
    <text x="340" y="124" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3C3489">API Gateway  :8080</text>
    <text x="340" y="143" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534AB7">JWT auth · Redis rate limiting · CORS · routing</text>
  </g>

  <line x1="196" y1="160" x2="155" y2="212" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="340" y1="160" x2="340" y2="212" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="490" y1="160" x2="530" y2="212" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── User Service (teal) ── -->
  <g>
    <rect x="36" y="212" width="190" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
    <text x="131" y="232" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">User Service  :8081</text>
    <text x="131" y="251" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">Auth · profile · VPA mgmt</text>
  </g>

  <!-- ── Transaction Service (blue) ── -->
  <g>
    <rect x="245" y="212" width="190" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
    <text x="340" y="232" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#0C447C">Transaction Service  :8082</text>
    <text x="340" y="251" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#185FA5">UPI payments · Feign client</text>
  </g>

  <!-- ── Fraud Service (coral) ── -->
  <g>
    <rect x="454" y="212" width="190" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
    <text x="549" y="232" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#712B13">Fraud Service  :8083</text>
    <text x="549" y="251" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#993C1D">AI fraud detection · RAG</text>
  </g>

  <!-- Transaction → Fraud (Feign) -->
  <line x1="435" y1="240" x2="454" y2="240" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Fraud → AI pipeline -->
  <line x1="549" y1="268" x2="549" y2="320" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── AI Pipeline container ── -->
  <rect x="390" y="310" width="254" height="240" rx="12" fill="none" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="6 4"/>
  <text x="517" y="328" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#888780">AI pipeline</text>

  <g>
    <rect x="406" y="340" width="222" height="44" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
    <text x="517" y="358" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#633806">Rules engine</text>
    <text x="517" y="374" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#854F0B">10 rules · score in &lt;5 ms</text>
  </g>
  <line x1="517" y1="384" x2="517" y2="408" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g>
    <rect x="406" y="408" width="222" height="44" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
    <text x="517" y="426" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#633806">RAG  (pgvector)</text>
    <text x="517" y="442" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#854F0B">3 category searches · RBI/NPCI</text>
  </g>
  <line x1="517" y1="452" x2="517" y2="476" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g>
    <rect x="406" y="476" width="222" height="44" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
    <text x="517" y="494" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#633806">Gemini 2.5 Flash</text>
    <text x="517" y="510" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#854F0B">Legal explanation · 3–8 s</text>
  </g>

  <!-- ── Infrastructure container ── -->
  <rect x="36" y="310" width="328" height="336" rx="12" fill="none" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="6 4"/>
  <text x="200" y="328" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#888780">Infrastructure</text>

  <g>
    <rect x="52" y="340" width="296" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
    <text x="200" y="360" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#0C447C">PostgreSQL  :5432  +  pgvector</text>
    <text x="200" y="379" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#185FA5">Transaction data · vector embeddings</text>
  </g>

  <g>
    <rect x="52" y="416" width="296" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
    <text x="200" y="436" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#0C447C">Apache Kafka  :9092</text>
    <text x="200" y="455" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#185FA5">Async event streaming · Kafka UI :8090</text>
  </g>

  <g>
    <rect x="52" y="492" width="296" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
    <text x="200" y="510" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#0C447C">Redis  :6379</text>
    <text x="200" y="529" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#185FA5">Rate limiting · token bucket per user/IP</text>
  </g>

  <g>
    <rect x="52" y="556" width="296" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
    <text x="200" y="574" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#0C447C">Eureka  :8761</text>
    <text x="200" y="593" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#185FA5">Service discovery · health dashboard</text>
  </g>

  <!-- dashed links -->
  <path d="M340 268 L340 300 L200 300 L200 310" fill="none" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <path d="M406 442 L372 442 L372 368 L348 368" fill="none" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

  <!-- ── Legend ── -->
  <rect x="36" y="668" width="608" height="152" rx="10" fill="none" stroke="#D3D1C7" stroke-width="0.5"/>
  <text x="340" y="686" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#888780">Legend</text>

  <rect x="56" y="702" width="14" height="14" rx="3" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="76" y="709" dominant-baseline="central" font-size="12" fill="#5F5E5A">Gateway</text>

  <rect x="160" y="702" width="14" height="14" rx="3" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="180" y="709" dominant-baseline="central" font-size="12" fill="#5F5E5A">User service</text>

  <rect x="284" y="702" width="14" height="14" rx="3" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="304" y="709" dominant-baseline="central" font-size="12" fill="#5F5E5A">Transaction service / Infra</text>

  <rect x="468" y="702" width="14" height="14" rx="3" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="488" y="709" dominant-baseline="central" font-size="12" fill="#5F5E5A">Fraud service</text>

  <rect x="576" y="702" width="14" height="14" rx="3" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="596" y="709" dominant-baseline="central" font-size="12" fill="#5F5E5A">AI pipeline</text>

  <rect x="56" y="730" width="14" height="14" rx="3" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="76" y="737" dominant-baseline="central" font-size="12" fill="#5F5E5A">Client</text>

  <line x1="160" y1="737" x2="188" y2="737" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="196" y="744" dominant-baseline="central" font-size="12" fill="#5F5E5A">HTTP / Feign call</text>

  <line x1="340" y1="737" x2="368" y2="737" fill="none" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text x="376" y="744" dominant-baseline="central" font-size="12" fill="#5F5E5A">Data / async link</text>
</svg>
