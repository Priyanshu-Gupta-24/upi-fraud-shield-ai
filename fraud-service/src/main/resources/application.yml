server:
  port: 8083

spring:
  application:
    name: fraud-service

  datasource:
    url: jdbc:postgresql://localhost:5432/upifraudshieldai_db
    username: user
    password: pass
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  kafka:
    bootstrap-servers: localhost:9092
    admin:
      fail-fast: false
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    consumer:
      group-id: fraud-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"

  # Spring AI - Gemini
  ai:
    # pgvector store
    vectorstore:
      pgvector:
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 768
        initialize-schema: true
    google:
      genai:
        api-key: ${YOUR_GEMINI_API_KEY}
        chat:
          options:
            model: gemini-2.5-flash
            temperature: 0.6
        embedding:
          text:
            options:
              model: gemini-embedding-001
              dimensions: 768
          api-key: ${YOUR_GEMINI_API_KEY}
    retry:
      max-attempts: 3
      backoff:
        initial-interval: 500ms
        max-interval: 2s

# Fraud rules thresholds
fraud:
  rules:
    high-amount-threshold: 50000        # Rs 50,000
    velocity-5min-limit: 3              # Max 3 txns in 5 minutes
    velocity-1hr-limit: 10              # Max 10 txns in 1 hour
    daily-amount-limit: 200000          # Rs 2,00,000 per day
    odd-hours-start: 1                  # 1 AM
    odd-hours-end: 4                    # 4 AM
    new-vpa-daily-limit: 3              # Max 3 new VPAs per day
    round-amount-threshold: 10000       # Flag round amounts above Rs 10,000
    failed-attempts-limit: 3            # Max 3 failed attempts
  rag:
    top-k: 3                           # Retrieve top 3 guideline chunks

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

kafka:
  topics:
    fraud-alerts: fraud-alerts

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.priyanshu: DEBUG
    org.springframework.ai: INFO
    org.apache.kafka.clients: WARN